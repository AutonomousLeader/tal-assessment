// ─── IN-DEPTH SCORING ────────────────────────────────────────────────────────
const RANGE_MIDPOINTS = { "1-2": 1.5, "3": 3, "4-5": 4.5, "6-7": 6.5 };
const RANGE_ORDER = ["1-2", "3", "4-5", "6-7"];

function calculateDeepResult(deepAnswers) {
  const pLevels = {};
  for (let i = 0; i < 9; i++) {
    const ladderRange = deepAnswers[i * 2];
    const realityRange = deepAnswers[i * 2 + 1];
    const ladderScore = RANGE_MIDPOINTS[ladderRange];
    const realityScore = RANGE_MIDPOINTS[realityRange];

    const ladderPos = RANGE_ORDER.indexOf(ladderRange);
    const realityPos = RANGE_ORDER.indexOf(realityRange);

    let finalScore;
    if (Math.abs(ladderPos - realityPos) >= 2) {
      finalScore = Math.min(ladderScore, realityScore);
    } else {
      finalScore = (ladderScore + realityScore) / 2;
    }

    pLevels[P_NAMES[i]] = Math.max(1, Math.min(7, Math.round(finalScore)));
  }

  const entries = Object.entries(pLevels);
  const sorted = [...entries].sort((a, b) => a[1] - b[1]);
  // Overall level = average across all P's, rounded up
  const avg = entries.reduce((sum, e) => sum + e[1], 0) / entries.length;
  const overallLevel = Math.min(7, Math.ceil(avg));
  const primaryConstraint = sorted[0][0];
  const superpower = sorted[sorted.length - 1][0];

  return { pLevels, overallLevel, primaryConstraint, superpower };
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function calculateResult(answersArr) {
  let totalPoints = 0;
  answersArr.forEach(a => {
    if (a === "yes") totalPoints += 2;
    else if (a === "inProgress") totalPoints += 1;
  });

  let level;
  if (totalPoints <= 3) level = 1;
  else if (totalPoints <= 6) level = 2;
  else if (totalPoints <= 10) level = 3;
  else if (totalPoints <= 14) level = 4;
  else if (totalPoints <= 18) level = 5;
  else if (totalPoints <= 22) level = 6;
  else level = 7;

  const categoryScores = CATEGORIES.map(cat => ({
    ...cat,
    answers: cat.indices.map(i => answersArr[i]),
    points: cat.indices.reduce((sum, i) => {
      if (answersArr[i] === "yes") return sum + 2;
      if (answersArr[i] === "inProgress") return sum + 1;
      return sum;
    }, 0),
    maxPoints: cat.indices.length * 2,
  }));

  // Derive approximate P-level signals from quick answers
  const pSignalScores = {};
  answersArr.forEach((a, i) => {
    const pName = QUICK_P_MAP[i];
    if (!pSignalScores[pName]) pSignalScores[pName] = { points: 0, max: 0 };
    pSignalScores[pName].max += 2;
    if (a === "yes") pSignalScores[pName].points += 2;
    else if (a === "inProgress") pSignalScores[pName].points += 1;
  });

  // Convert raw scores to signal labels: Strong / Growing / Developing
  const pSignals = {};
  Object.entries(pSignalScores).forEach(([pName, { points, max }]) => {
    const pct = points / max;
    if (pct >= 0.75) pSignals[pName] = "Strong";
    else if (pct >= 0.4) pSignals[pName] = "Growing";
    else pSignals[pName] = "Developing";
  });

  // P's not directly measured by quick assessment
  P_NAMES.forEach(p => {
    if (!pSignals[p]) pSignals[p] = null;
  });

  return { level, totalPoints, categoryScores, pSignals };
}

function BrandMarkChart({ pLevels, onBladeHover, hoveredBlade }) {
  const isTouchDevice = typeof window !== "undefined" && "ontouchstart" in window;
  return (
    <div style={{ position: "relative", width: "100%", maxWidth: 460, margin: "0 auto" }}>
      <svg viewBox="-25 -12 150 130" style={{ width: "100%", height: "auto", overflow: "visible" }}>
        {BLADE_PATHS.map((blade, bladeIdx) => {
          const pName = P_NAMES[bladeIdx];
          const assessedLevel = pLevels[pName] || 0;
          const isHovered = hoveredBlade === bladeIdx;

          return (
            <g
              key={bladeIdx}
              style={{
                transformOrigin: "50px 50px",
                transform: isHovered ? "scale(1.22)" : "scale(1)",
                transition: "transform 0.3s ease",
                cursor: "pointer",
                filter: isHovered ? "drop-shadow(0 0 6px " + BRAND.teal + ")" : "none",
              }}
              onMouseEnter={isTouchDevice ? undefined : () => onBladeHover(bladeIdx)}
              onMouseLeave={isTouchDevice ? undefined : () => onBladeHover(null)}
              onClick={() => onBladeHover(isHovered ? null : bladeIdx)}
            >
              {blade.map((d, segIdx) => {
                const isFilled = segIdx < assessedLevel;
                return (
                  <path
                    key={segIdx}
                    d={d}
                    fill={isFilled ? BLADE_COLORS[segIdx] : DIMMED}
                    stroke={isFilled ? "none" : DIMMED_STROKE}
                    strokeWidth={isFilled ? 0 : 0.3}
                    style={{ transition: "fill 0.4s ease" }}
                  />
                );
              })}
            </g>
          );
        })}

        <circle cx="50" cy="50" r="4" fill="#16d4e8" />
        <circle cx="50" cy="50" r="5.7" fill="none" stroke="#16d4e8" strokeWidth="0.4" opacity="0.35" />

        {P_NAMES.map((name, i) => {
          const pos = BLADE_LABEL_POS[i];
          const isHovered = hoveredBlade === i;
          return (
            <text
              key={i}
              x={pos.x}
              y={pos.y}
              textAnchor={pos.anchor}
              style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: "3.2px",
                letterSpacing: "0.12em",
                textTransform: "uppercase",
                fill: isHovered ? BRAND.teal : BRAND.gray,
                transition: "fill 0.2s ease",
                cursor: "pointer",
              }}
              onMouseEnter={isTouchDevice ? undefined : () => onBladeHover(i)}
              onMouseLeave={isTouchDevice ? undefined : () => onBladeHover(null)}
              onClick={() => onBladeHover(hoveredBlade === i ? null : i)}
            >
              {name}
            </text>
          );
        })}
      </svg>

      {hoveredBlade !== null && (
        <div style={{
          position: "absolute", bottom: -10, left: "50%", transform: "translateX(-50%)",
          background: BRAND.dark2, border: "1px solid rgba(22, 212, 232, 0.2)",
          padding: "1rem 1.5rem", borderRadius: "4px", width: "100%", maxWidth: 360,
          zIndex: 10, textAlign: "left",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
            <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "0.7rem", color: BRAND.teal, letterSpacing: "0.15em", textTransform: "uppercase" }}>
              {P_NAMES[hoveredBlade]}
            </span>
            <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "0.65rem", color: BRAND.paleTeal, letterSpacing: "0.1em" }}>
              LEVEL {pLevels[P_NAMES[hoveredBlade]]}

          </div>
          <p style={{ fontSize: "0.85rem", color: BRAND.lightGray, lineHeight: 1.6, margin: 0, marginBottom: "0.75rem" }}>

        </div>

  const [screen, setScreen] = useState("intro");

  const [firstName, setFirstName] = useState("");
  const [isFading, setIsFading] = useState(false);
  const [assessmentId, setAssessmentId] = useState(null);

  const [answers, setAnswers] = useState([]);
  const [result, setResult] = useState(null);

  const [deepAnswers, setDeepAnswers] = useState([]);
  const [deepResult, setDeepResult] = useState(null);
  const [hoveredBlade, setHoveredBlade] = useState(null);
  const [expandedP, setExpandedP] = useState(null);
  const [assessmentCount, setAssessmentCount] = useState(null);

  // Fetch counter on mount
  useEffect(() => {
    fetch(API_BASE + "/api/counter")
      .then(res => res.json())
      .then(data => {
        if (data.success) setAssessmentCount(data.data.count);
      })
      .catch(() => {}); // Fail silently — counter is social proof, not critical
  }, []);

  const transition = (fn) => {
    setIsFading(true);
    setTimeout(() => { fn(); setIsFading(false); }, 350);
  };

  const currentQIndex = answers.length;
  const currentQ = questions[currentQIndex];

  const handleStartQuick = () => {
    setAssessmentType("quick");
    transition(() => setScreen("framing"));
  };

  const handleStartDeep = () => {
    setAssessmentType("deep");
    transition(() => setScreen("framing"));
  };

  const handleBeginAssessment = () => {
    transition(() => setScreen(assessmentType === "deep" ? "deep-questions" : "questions"));
  };

  const handleAnswer = (type) => {
    const newAnswers = [...answers, type];
    setIsFading(true);
    setTimeout(() => {
      if (newAnswers.length < questions.length) {
        setAnswers(newAnswers);
        setIsFading(false);
      } else {
        setResult(calculateResult(newAnswers));
        setAnswers(newAnswers);
        setScreen("email");
        setIsFading(false);
      }
    }, 350);
  };

  const deepQIndex = deepAnswers.length;
  const currentDeepQ = deepQuestions[deepQIndex];
  const currentPIndex = Math.floor(deepQIndex / 2);
  const currentPStep = (deepQIndex % 2) + 1;

  const handleDeepAnswer = (range) => {
    const newAnswers = [...deepAnswers, range];
    setIsFading(true);
    setTimeout(() => {
      if (newAnswers.length < deepQuestions.length) {
        setDeepAnswers(newAnswers);
        setIsFading(false);
      } else {
        setDeepResult(calculateDeepResult(newAnswers));
        setDeepAnswers(newAnswers);
        setScreen("email");
        setIsFading(false);
      }
    }, 350);
  };

  const handleEmailSubmit = (e) => {
    e.preventDefault();

    // Build payload — flagged defaults to false, user decides after seeing results
    const payload = { email, firstName, assessmentType, flagged: false };

    if (assessmentType === "quick" && result) {
      payload.levelResult = result.level;
      payload.totalPoints = result.totalPoints;
      payload.categoryScores = result.categoryScores.map(cat => ({
        name: cat.name, points: cat.points, maxPoints: cat.maxPoints,
      }));
      payload.individualAnswers = answers;
    } else if (assessmentType === "deep" && deepResult) {
      payload.levelResult = deepResult.overallLevel;
      payload.pLevels = deepResult.pLevels;
      payload.primaryConstraint = deepResult.primaryConstraint;
      payload.superpower = deepResult.superpower;
      payload.deepAnswers = deepAnswers;
    }

    // Fire and forget — don't block the UI on API success
    fetch(API_BASE + "/api/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          if (data.data.counter) setAssessmentCount(data.data.counter);
          if (data.data.id) setAssessmentId(data.data.id);
        }
      })
      .catch(err => console.warn("Assessment submission failed:", err));

    // Continue to congrats immediately
    if (assessmentType === "deep" && deepResult) {
      setExpandedP(deepResult.primaryConstraint);
    }
    transition(() => setScreen("congrats"));
  };

  const handleFlagFromResults = () => {
    setFlagged(true);

    // Fire PATCH to mark this assessment as flagged
    if (assessmentId) {

                              <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "0.6rem", color: BRAND.teal, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "0.5rem", fontWeight: 700 }}>
                                The Solution
                              </div>
                              <p style={{ fontSize: "0.85rem", color: BRAND.lightGray, lineHeight: 1.65, margin: 0 }}>
                                {P_LEVEL_UNLOCK[pName][pLevel]}
                              </p>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── YOUR PLAYBOOK THIS WEEK ── */}
            {(() => {
              const constraintP = deepResult.primaryConstraint;
              const constraintLevel = deepResult.pLevels[constraintP];
              const superpowerP = deepResult.superpower;
              const superpowerLevel = deepResult.pLevels[superpowerP];
              return (
                <div style={{ background: "rgba(8,126,139,0.06)", border: "1px solid rgba(8,126,139,0.2)", borderRadius: "6px", padding: "2.5rem", marginBottom: "3rem" }}>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "0.7rem", color: BRAND.teal, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: "0.75rem", fontWeight: 700 }}>
                    Your Playbook This Week
                  </div>
                  <h3 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "1.5rem", fontWeight: 700, color: BRAND.offWhite, marginBottom: "1.5rem" }}>
                    Start here — {constraintP} is the bottleneck
                  </h3>
                  <p style={{ fontSize: "0.95rem", color: BRAND.lightGray, lineHeight: 1.75, marginBottom: "1.5rem" }}>
                    {SOLUTION_LONG[constraintP][constraintLevel]}
                  </p>
                  <div style={{ borderTop: "1px solid rgba(138,155,176,0.15)", paddingTop: "1.5rem", marginTop: "0.5rem" }}>
                    <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "0.65rem", color: BRAND.paleTeal, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "0.5rem" }}>
                      Meanwhile, protect your strength
                    </div>
                    <p style={{ fontSize: "0.85rem", color: BRAND.gray, lineHeight: 1.7, margin: 0 }}>
                      <strong style={{ color: BRAND.offWhite }}>{superpowerP} (Level {superpowerLevel}):</strong> {P_LEVEL_UNLOCK[superpowerP][superpowerLevel]}
                    </p>
                  </div>
                </div>
              );
            })()}

            <div style={{ textAlign: "center", paddingTop: "1rem" }}>
              {flagged ? (
                <div style={{ display: "inline-block", textAlign: "left", background: "rgba(46,109,164,0.07)", border: "1px solid rgba(46,109,164,0.2)", padding: "2rem", maxWidth: 600, borderRadius: "4px" }}>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "0.7rem", color: BRAND.accent, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: "0.75rem" }}>
                    You're on our radar
                  </div>
                  <p style={{ fontSize: "0.95rem", color: BRAND.gray, lineHeight: 1.75, margin: 0 }}>
                    Someone from our team will reach out to you directly. You don't need to wait for a sequence — we'll come to you to discuss these findings.
                  </p>
                </div>
              ) : (
                <div style={{ maxWidth: 600, margin: "0 auto" }}>
                  <h3 style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "1.4rem", fontWeight: 700, color: BRAND.offWhite, lineHeight: 1.4, marginBottom: "1rem" }}>
                    You've seen where {deepResult.primaryConstraint} is holding you back. Want to walk through the fix with someone who's helped hundreds of owners break through this exact constraint?
                  </h3>
                  <p style={{ fontSize: "0.95rem", color: BRAND.gray, lineHeight: 1.7, marginBottom: "2rem" }}>
                    A 40–60 minute business assessment call. No pitch — just a focused conversation on your {deepResult.primaryConstraint} bottleneck and the fastest path forward.
                  </p>
                  <div style={{ display: "flex", gap: "1rem", justifyContent: "center", flexWrap: "wrap" }}>
                    <button className="btn-gold" onClick={handleFlagFromResults}>
                      Yes, let's talk about {deepResult.primaryConstraint}
                    </button>
                    <button className="btn-ghost" style={{ opacity: 0.6 }}>
                      I'm good for now
                    </button>
                  </div>
                </div>
              )}
            </div>

          </div>
        )}

      </div>
    </div>
  );
}
